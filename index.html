<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Slice Demo</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #eaeaea; }
    canvas { display: block; }
    .hint {
      position: fixed; bottom: 12px; left: 12px;
      font: 12px -apple-system, system-ui, sans-serif;
      color: #888; user-select: none;
      pointer-events: none;
    }
    .toggle {
      position: fixed; top: 12px; right: 12px;
      width: 40px; height: 40px;
      border: none; background: rgba(255,255,255,0.55);
      border-radius: 8px; cursor: pointer;
      font-size: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 100; user-select: none;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .toggle:hover { background: rgba(255,255,255,0.8); }
    .toggle svg { display: block; }
    .mode-toggle {
      position: fixed; top: 12px; left: 12px;
      height: 32px; padding: 0 14px;
      border: none;
      background: rgba(200,200,200,0.5);
      border-radius: 8px; cursor: pointer;
      font: 600 12px -apple-system, system-ui, sans-serif;
      letter-spacing: 0.1em;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 100;
      user-select: none;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      min-width: 64px;
    }
    .mode-toggle:hover { background: rgba(200,200,200,0.72); }
    .mode-toggle.mode-play { background: rgba(170,205,170,0.55); color: #173817; }
    .mode-toggle.mode-play:hover { background: rgba(170,205,170,0.78); }
    .speed-toggle {
      position: fixed; top: 12px; left: 96px;
      height: 32px; padding: 0 12px;
      border: none;
      background: rgba(200,200,200,0.5);
      border-radius: 8px; cursor: pointer;
      font: 600 12px ui-monospace, Menlo, Consolas, monospace;
      color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 100;
      user-select: none;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      min-width: 44px;
    }
    .speed-toggle:hover { background: rgba(200,200,200,0.72); }
    .toggle.export { right: 60px; }
    #cropOverlay {
      position: fixed; inset: 0;
      z-index: 95;
      cursor: crosshair;
      touch-action: none;
    }
    .crop-rect {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.92);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.42);
      pointer-events: none;
    }
    .crop-toolbar {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.94);
      padding: 8px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      font: 13px -apple-system, system-ui, sans-serif;
    }
    .crop-toolbar .crop-hint { color: #555; margin-right: 4px; }
    .crop-toolbar button {
      padding: 6px 14px;
      border: none; border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }
    .crop-toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .crop-toolbar button#cropOkBtn     { background: #2c7a2c; color: #fff; }
    .crop-toolbar button#cropOkBtn:hover:not(:disabled) { background: #348534; }
    .crop-toolbar button#cropFitBtn    { background: #d8d8d8; color: #1a1a1a; }
    .crop-toolbar button#cropFitBtn:hover { background: #c8c8c8; }
    .crop-toolbar button#cropCancelBtn { background: transparent; color: #666; }
    .crop-toolbar button#cropCancelBtn:hover { background: rgba(0,0,0,0.06); color: #222; }
    .panel {
      position: fixed; top: 0; right: 0;
      height: 100vh; width: 320px;
      background: rgba(252,252,252,0.40);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 56px 16px 16px; box-sizing: border-box;
      overflow-y: auto;
      z-index: 99;
      font: 13px -apple-system, system-ui, sans-serif;
      color: #1a1a1a;
      border-left: 1px solid rgba(0,0,0,0.06);
      box-shadow: -4px 0 20px rgba(0,0,0,0.05);
      transition: transform 0.25s ease;
      text-shadow: 0 0 1px rgba(255,255,255,0.4);
    }
    .panel[hidden] { display: block; transform: translateX(100%); }
    .panel:not([hidden]) { transform: translateX(0); }
    .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      margin: 16px 0 6px; color: #555; font-weight: 600; }
    .panel h2:first-child { margin-top: 0; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .row label { flex: 0 0 110px; color: #333; }
    .row input[type=range] { flex: 1; min-width: 0; }
    .row .val { flex: 0 0 48px; text-align: right; color: #111;
      font-variant-numeric: tabular-nums; font-size: 12px; }
    .row select, .row input[type=color] { flex: 1; }
    .row input[type=color] { height: 22px; padding: 0; border: 1px solid rgba(0,0,0,0.2); border-radius: 3px; }
    .row input[type=checkbox] { margin-left: 0; }
    .panel .actions { margin-top: 14px; }
    .panel button.action { width: 100%; padding: 8px; cursor: pointer;
      background: rgba(20,20,20,0.85); color: #fff; border: none; border-radius: 6px;
      font: inherit; }
    .panel button.action:hover { background: rgba(40,40,40,0.95); }
    .panel .actions { display: flex; gap: 8px; }
    .panel button.action { flex: 1; }
    .panel button.action.secondary { background: rgba(0,0,0,0.12); color: #1a1a1a; }
    .panel button.action.secondary:hover { background: rgba(0,0,0,0.22); }
    .hud {
      position: fixed; bottom: 12px; right: 12px;
      font: 12px ui-monospace, Menlo, Consolas, monospace;
      background: rgba(255,255,255,0.5);
      padding: 6px 10px;
      border-radius: 6px;
      color: #222;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 50;
      min-width: 110px;
    }
    .hud-row { display: flex; justify-content: space-between; gap: 14px; }
    .hud-label { color: #666; }
    .hud-value { font-variant-numeric: tabular-nums; color: #1a1a1a; }
    .hud-value.warn { color: #b56500; }
    .hud-value.bad  { color: #c43c3c; }
    body.panel-open .hud { display: none; }
    .panel .repo { margin-top: 14px; text-align: center; font-size: 12px; color: #555; }
    .panel .repo a { color: #1a4f8c; text-decoration: none; }
    .panel .repo a:hover { text-decoration: underline; }
    .cam-only { transition: opacity 0.15s; }
    body.no-cam .cam-only { display: none; }
    #vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
      backdrop-filter: blur(var(--vignette-blur, 18px));
      -webkit-backdrop-filter: blur(var(--vignette-blur, 18px));
      mask-image: radial-gradient(ellipse at center, transparent 58%, #000 96%);
      -webkit-mask-image: radial-gradient(ellipse at center, transparent 58%, #000 96%);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="vignette"></div>
  <div class="hint">click / espace = recommencer</div>
  <div class="hud" id="hud">
    <div class="hud-row"><span class="hud-label">Pièces</span><span class="hud-value" id="hud_count">0</span></div>
    <div class="hud-row"><span class="hud-label">Perf</span><span class="hud-value" id="hud_fps">—</span></div>
    <div class="hud-row"><span class="hud-label">Charge</span><span class="hud-value" id="hud_deg">—</span></div>
  </div>
  <button class="mode-toggle" id="modeBtn" title="Basculer mode démo / interactif">DEMO</button>
  <button class="speed-toggle" id="speedBtn" title="Vitesse globale">1×</button>
  <button class="toggle export" id="exportBtn" title="Exporter en PNG">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
  <button class="toggle" id="toggleBtn" title="Réglages">⚙</button>
  <div id="cropOverlay" hidden>
    <div class="crop-rect" id="cropRect" hidden></div>
    <div class="crop-toolbar">
      <span class="crop-hint">Glisse pour sélectionner une zone</span>
      <button id="cropOkBtn" disabled>Exporter</button>
      <button id="cropFitBtn">Tout cadrer</button>
      <button id="cropCancelBtn">Annuler</button>
    </div>
  </div>
  <div class="panel" id="panel" hidden>
    <h2>Setup</h2>
    <div class="row">
      <label>Formes</label>
      <input type="range" id="p_count" min="1" max="30" step="1">
      <span class="val" id="v_count"></span>
    </div>
    <div class="row">
      <label>Marge centrale</label>
      <input type="range" id="p_shapeInset" min="0" max="0.3" step="0.01">
      <span class="val" id="v_shapeInset"></span>
    </div>
    <div class="row">
      <label>Espacement</label>
      <input type="range" id="p_shapeGap" min="0" max="60" step="1">
      <span class="val" id="v_shapeGap"></span>
    </div>
    <div class="row">
      <label>Mode caméra</label>
      <select id="p_cameraMode">
        <option value="fix">Fixe</option>
        <option value="pan">Pan</option>
        <option value="zoom">Zoom infini</option>
      </select>
    </div>
    <div class="row">
      <label>Interactif</label>
      <input type="checkbox" id="p_interactive">
    </div>
    <h2 class="cam-only">Caméra</h2>
    <div class="row cam-only">
      <label>Padding</label>
      <input type="range" id="p_camPadding" min="10" max="200" step="5">
      <span class="val" id="v_camPadding"></span>
    </div>
    <div class="row cam-only">
      <label>Zoom max</label>
      <input type="range" id="p_camMaxZoom" min="1" max="5" step="0.1">
      <span class="val" id="v_camMaxZoom"></span>
    </div>
    <div class="row cam-only">
      <label>Vitesse pan</label>
      <input type="range" id="p_camPanDuration" min="200" max="2500" step="50">
      <span class="val" id="v_camPanDuration"></span>
    </div>
    <div class="row cam-only">
      <label>Coupes min</label>
      <input type="range" id="p_camCuts" min="1" max="10" step="1">
      <span class="val" id="v_camCuts"></span>
    </div>
    <div class="row cam-only">
      <label>Coupes max</label>
      <input type="range" id="p_camCutsMax" min="1" max="12" step="1">
      <span class="val" id="v_camCutsMax"></span>
    </div>
    <div class="row cam-only">
      <label>Pause vue</label>
      <input type="range" id="p_camOverviewHold" min="0" max="2000" step="50">
      <span class="val" id="v_camOverviewHold"></span>
    </div>
    <h2>Coupe</h2>
    <div class="row">
      <label>Vitesse</label>
      <input type="range" id="p_animDur" min="200" max="3000" step="50">
      <span class="val" id="v_animDur"></span>
    </div>
    <div class="row">
      <label>Mode</label>
      <select id="p_cutMode">
        <option value="rigid">Rigide</option>
        <option value="jelly">Jelly</option>
        <option value="wave">Vague</option>
        <option value="squash">Squash</option>
      </select>
    </div>
    <div class="row">
      <label>Élasticité</label>
      <input type="range" id="p_elasticity" min="3" max="20" step="0.5">
      <span class="val" id="v_elasticity"></span>
    </div>
    <div class="row">
      <label>Spread jelly</label>
      <input type="range" id="p_jellySpread" min="0" max="0.4" step="0.01">
      <span class="val" id="v_jellySpread"></span>
    </div>
    <div class="row">
      <label>Écartement</label>
      <input type="range" id="p_separation" min="5" max="100" step="1">
      <span class="val" id="v_separation"></span>
    </div>
    <div class="row">
      <label>Pièces colorées</label>
      <input type="range" id="p_colorCount" min="0" max="8" step="1">
      <span class="val" id="v_colorCount"></span>
    </div>
    <h2>Ligne</h2>
    <div class="row">
      <label>Vitesse</label>
      <input type="range" id="p_lineSpeed" min="40" max="800" step="10">
      <span class="val" id="v_lineSpeed"></span>
    </div>
    <div class="row">
      <label>Maintien</label>
      <input type="range" id="p_splitPhase" min="50" max="1500" step="25">
      <span class="val" id="v_splitPhase"></span>
    </div>
    <div class="row">
      <label>Pause</label>
      <input type="range" id="p_pausePhase" min="0" max="1500" step="25">
      <span class="val" id="v_pausePhase"></span>
    </div>
    <div class="row">
      <label>Glow</label>
      <input type="range" id="p_glow" min="0" max="60" step="1">
      <span class="val" id="v_glow"></span>
    </div>
    <div class="row">
      <label>Glow decay</label>
      <input type="range" id="p_glowDecay" min="40" max="1000" step="20">
      <span class="val" id="v_glowDecay"></span>
    </div>
    <div class="row">
      <label>Glow intensité</label>
      <input type="range" id="p_glowIntensity" min="0.1" max="2" step="0.05">
      <span class="val" id="v_glowIntensity"></span>
    </div>
    <h2>Couleur</h2>
    <div class="row">
      <label>Fade min</label>
      <input type="range" id="p_fadeMin" min="1000" max="60000" step="500">
      <span class="val" id="v_fadeMin"></span>
    </div>
    <div class="row">
      <label>Fade max</label>
      <input type="range" id="p_fadeMax" min="1000" max="60000" step="500">
      <span class="val" id="v_fadeMax"></span>
    </div>
    <h2>Apparence</h2>
    <div class="row">
      <label>Fond</label>
      <input type="color" id="p_bg">
    </div>
    <div class="row">
      <label>Trait</label>
      <input type="color" id="p_stroke">
    </div>
    <div class="row">
      <label>Épaisseur</label>
      <input type="range" id="p_strokeWidth" min="1" max="14" step="1">
      <span class="val" id="v_strokeWidth"></span>
    </div>
    <div class="row">
      <label>Trait proportionnel</label>
      <input type="checkbox" id="p_proportionalStroke">
    </div>
    <div class="row">
      <label>Réf. trait</label>
      <input type="range" id="p_strokeRefRadius" min="20" max="200" step="5">
      <span class="val" id="v_strokeRefRadius"></span>
    </div>
    <div class="row">
      <label>Trait max</label>
      <input type="range" id="p_strokeMaxWidth" min="2" max="80" step="1">
      <span class="val" id="v_strokeMaxWidth"></span>
    </div>
    <div class="row">
      <label>Vignette</label>
      <input type="range" id="p_vignette" min="0" max="40" step="1">
      <span class="val" id="v_vignette"></span>
    </div>
    <div class="row">
      <label>Style</label>
      <select id="p_strokeStyle">
        <option value="rivets">Rivets</option>
        <option value="solid">Continu</option>
        <option value="dashed">Tirets</option>
        <option value="dotted">Pointillés</option>
      </select>
    </div>
    <h2>Son</h2>
    <div class="row">
      <label>Activé</label>
      <input type="checkbox" id="p_audioOn">
    </div>
    <div class="row">
      <label>Volume</label>
      <input type="range" id="p_audioVolume" min="0" max="1" step="0.05">
      <span class="val" id="v_audioVolume"></span>
    </div>
    <div class="actions">
      <button class="action" id="resetBtn">Recommencer</button>
      <button class="action secondary" id="resetSettingsBtn">Défauts</button>
    </div>
    <div class="repo">
      <a href="https://github.com/serge-fantino/AIChallenge" target="_blank" rel="noopener">github.com/serge-fantino/AIChallenge</a>
    </div>
  </div>
<script>
const defaultSettings = {
  shapeCount: 20,
  shapeInset: 0.12,
  shapeGap: 8,
  cameraMode: 'pan',
  interactive: false,
  camPadding: 70,
  camMaxZoom: 2.6,
  camPanDuration: 900,
  camCuts: 3,
  camCutsMax: 6,
  camOverviewHold: 350,
  speed: 1,
  animDuration: 1000,
  elasticity: 9,
  separation: 32,
  cutMode: 'jelly',
  jellySpread: 0.1,
  colorCount: 1,
  lineSpeed: 160,
  splitPhase: 250,
  pausePhase: 250,
  glow: 24,
  glowDecay: 220,
  glowIntensity: 1,
  fadeMin: 10000,
  fadeMax: 20000,
  bgColor: '#eaeaea',
  strokeColor: '#9a9a9a',
  strokeWidth: 5,
  strokeStyle: 'rivets',
  proportionalStroke: true,
  strokeRefRadius: 60,
  strokeMaxWidth: 18,
  exportScale: 3,
  vignette: 18,
  audioOn: true,
  audioVolume: 0.4,
};
const settings = { ...defaultSettings };

const STORAGE_KEY = 'sliceDemo.settings.v1';
function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    for (const k of Object.keys(saved)) {
      if (k in settings) settings[k] = saved[k];
    }
  } catch (e) { /* ignore corrupted storage */ }
}
function saveSettings() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); }
  catch (e) { /* ignore quota / disabled storage */ }
}
loadSettings();

// ---------- audio ----------
const audio = {
  ctx: null,
  master: null,
  windNode: null,
  windGain: null,

  init() {
    if (this.ctx) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      this.ctx = new Ctx();
      this.master = this.ctx.createGain();
      this.master.gain.value = settings.audioOn ? settings.audioVolume : 0;
      this.master.connect(this.ctx.destination);
    } catch (e) { /* audio unsupported */ }
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  applyMasterVolume() {
    if (!this.master) return;
    this.master.gain.value = settings.audioOn ? settings.audioVolume : 0;
  },

  makeNoise(durationSec) {
    const ctx = this.ctx;
    const len = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  },

  laser() {
    if (!settings.audioOn || !this.ctx) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const dur = 0.18;
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(1800, now);
    osc.frequency.exponentialRampToValueAtTime(180, now + dur);
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(4000, now);
    lp.frequency.exponentialRampToValueAtTime(800, now + dur);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.45, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(lp); lp.connect(gain); gain.connect(this.master);
    osc.start(now);
    osc.stop(now + dur + 0.02);
  },

  shatter() {
    if (!settings.audioOn || !this.ctx) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;
    // 1) low-mid impact: short bandpass noise burst
    const impactDur = 0.06;
    const impact = ctx.createBufferSource();
    impact.buffer = this.makeNoise(impactDur);
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 400; bp.Q.value = 1;
    const ig = ctx.createGain();
    ig.gain.setValueAtTime(0.5, now);
    ig.gain.exponentialRampToValueAtTime(0.001, now + impactDur);
    impact.connect(bp); bp.connect(ig); ig.connect(this.master);
    impact.start(now);
    // 2) shatter tail: high-pass noise with slow decay
    const tailDur = 0.35;
    const tail = ctx.createBufferSource();
    tail.buffer = this.makeNoise(tailDur);
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 2200;
    const tg = ctx.createGain();
    tg.gain.setValueAtTime(0.35, now + 0.02);
    tg.gain.exponentialRampToValueAtTime(0.001, now + tailDur);
    tail.connect(hp); hp.connect(tg); tg.connect(this.master);
    tail.start(now + 0.02);
    // 3) a handful of high-pitched "tings" at random offsets
    const tings = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < tings; i++) {
      const t = now + Math.random() * 0.18;
      const freq = 1500 + Math.random() * 3500;
      const o = ctx.createOscillator();
      o.type = 'triangle';
      o.frequency.value = freq;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.13, t + 0.003);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1 + Math.random() * 0.12);
      o.connect(g); g.connect(this.master);
      o.start(t);
      o.stop(t + 0.28);
    }
  },

  ensureWind(active) {
    if (!this.ctx) return;
    if (!settings.audioOn) active = false;
    if (active) {
      if (!this.windNode) this._startWind();
    } else {
      if (this.windNode) this._stopWind();

  _startWind() {

    node.buffer = this.makeNoise(2);
    node.loop = true;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 700;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 350; bp.Q.value = 0.5;
    const gain = ctx.createGain();
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.25);
    node.connect(lp); lp.connect(bp); bp.connect(gain); gain.connect(this.master);
    node.start(now);
    this.windNode = node;
    this.windGain = gain;
  },

  _stopWind() {
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const node = this.windNode;
    const gain = this.windGain;
    this.windNode = null;
    this.windGain = null;
    gain.gain.cancelScheduledValues(now);
    gain.gain.setValueAtTime(gain.gain.value, now);
    gain.gain.linearRampToValueAtTime(0.0001, now + 0.4);

function identityCamera() { return { cx: W / 2, cy: H / 2, scale: 1 }; }

// ---------- color helpers ----------
function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60)       { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}
function parseHSL(str) {
  const m = str.match(/hsl\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%\s*\)/);
  if (!m) return [128, 128, 128];
  return hslToRgb(parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3]));
}
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function neutralRGB() { return hexToRgb(settings.strokeColor); }
function glowColorFor(hslStr) {
  const m = hslStr.match(/hsl\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%\s*\)/);
  if (!m) return hslStr;
  const h = parseFloat(m[1]);
  const s = parseFloat(m[2]) * 0.6;
  const l = Math.min(88, parseFloat(m[3]) + 30);
  return `hsl(${h}, ${s}%, ${l}%)`;
}

// ---------- geometry ----------
function centroid(pts) {
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  return { x: cx / pts.length, y: cy / pts.length };
}
function area(pts) {
  let a = 0;
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const p1 = pts[i], p2 = pts[(i + 1) % n];
    a += p1.x * p2.y - p2.x * p1.y;
  }
  return Math.abs(a) / 2;
}
function boundingRadius(pts, c) {
  let r = 0;
  for (const p of pts) {
    const d = Math.hypot(p.x - c.x, p.y - c.y);
    if (d > r) r = d;
  }
  return r;
}
// Centroid / bounding radius caches: cleared on bake (when points shift, the
// cached centroid is updated in place; bounding radius is shape-invariant
// under uniform translation).
function getCentroid(s) {
  if (!s._centroid) s._centroid = centroid(s.points);
  return s._centroid;
}
function getBoundingRadius(s) {
  if (s._boundingRadius == null) {
    s._boundingRadius = boundingRadius(s.points, getCentroid(s));
  }
  return s._boundingRadius;
}
function finalCentroid(s) {
  const c = getCentroid(s);
  if (s.anim) return { x: c.x + s.anim.targetDx, y: c.y + s.anim.targetDy };

}

// account: at higher scale, smaller world-area shapes still look large on
// screen and remain cuttable.
function isCuttable(s) {
  return area(s.points) * camera.scale * camera.scale >= MIN_AREA;

function makeCircle(cx, cy, r, segments = 28) {
  const pts = [];
  const a0 = Math.random() * Math.PI * 2;
  for (let i = 0; i < segments; i++) {
    const a = a0 + (i / segments) * Math.PI * 2;
    pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
  }
  return pts;
}
function makeRegularPolygon(cx, cy, r, sides) {
  const a0 = Math.random() * Math.PI * 2;
  const pts = [];
  for (let i = 0; i < sides; i++) {
    const a = a0 + i * (Math.PI * 2 / sides);
    // slight per-vertex scale jitter so shapes don't look perfectly regular
    const rr = r * (0.85 + Math.random() * 0.3);
    pts.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr });
  }
  return pts;
}
function makeParallelogram(cx, cy, r) {
  const a0 = Math.random() * Math.PI * 2;
  const a1 = a0 + (Math.PI / 3 + Math.random() * Math.PI / 3);
  const len1 = r * (0.9 + Math.random() * 0.4);
  const len2 = r * (0.9 + Math.random() * 0.4);
  const v1 = { x: Math.cos(a0) * len1, y: Math.sin(a0) * len1 };
  const v2 = { x: Math.cos(a1) * len2, y: Math.sin(a1) * len2 };
  return [
    { x: cx - v1.x / 2 - v2.x / 2, y: cy - v1.y / 2 - v2.y / 2 },
    { x: cx + v1.x / 2 - v2.x / 2, y: cy + v1.y / 2 - v2.y / 2 },
    { x: cx + v1.x / 2 + v2.x / 2, y: cy + v1.y / 2 + v2.y / 2 },
    { x: cx - v1.x / 2 + v2.x / 2, y: cy - v1.y / 2 + v2.y / 2 },
  ];

// Pool of shape factories (cx, cy, r) -> points[]. Mixes circles, regular
// polygons of various sides, and parallelograms.
const SHAPE_KINDS = [
  (cx, cy, r) => makeCircle(cx, cy, r),
  (cx, cy, r) => makeRegularPolygon(cx, cy, r, 3),
  (cx, cy, r) => makeParallelogram(cx, cy, r),
  (cx, cy, r) => makeRegularPolygon(cx, cy, r, 5),
  (cx, cy, r) => makeRegularPolygon(cx, cy, r, 6),
  (cx, cy, r) => makeRegularPolygon(cx, cy, r, 7),
  (cx, cy, r) => makeRegularPolygon(cx, cy, r, 8),
];

// Phyllotaxis spiral (sunflower / golden-angle): starts at the center of
// the rect, walks outward placing each successive point at the golden angle
// from the previous and a radius growing as sqrt(n). Achieves hex-packing
// density (the densest possible for circles of the same size) and stops
// when the spiral has clearly left the rect. `c = minDist/2` gives each
// point a claimed area of π·(minDist/2)² — exactly the hex packing footprint.
function phyllotaxisPlacement(rectW, rectH, minDist, maxCount) {
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const c = minDist / 2;
  const cx = rectW / 2, cy = rectH / 2;
  const pts = [];
  let n = 0;
  let consecOut = 0;
  // Stop after enough consecutive out-of-rect samples (spiral has exited).
  while (pts.length < maxCount && consecOut < 200) {
    const r = c * Math.sqrt(n);
    const a = n * goldenAngle;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    n++;
    if (x >= 0 && x <= rectW && y >= 0 && y <= rectH) {
      pts.push({ x, y });
      consecOut = 0;
    } else {
      consecOut++;
    }
  }
  return pts;
}

// Bridson Poisson-disk sampling: blue-noise distribution of points within
// a rectangle, each at least `minDist` away from every other. Kept as an
// alternative; phyllotaxis is the default placement.
function poissonDiskPoints(rectW, rectH, minDist, maxPoints) {
  const k = 30; // candidates per active sample
  const cellSize = minDist / Math.SQRT2;
  const gridCols = Math.max(1, Math.ceil(rectW / cellSize));
  const gridRows = Math.max(1, Math.ceil(rectH / cellSize));
  const grid = new Array(gridCols * gridRows).fill(null);
  const points = [];
  const active = [];
  const minDist2 = minDist * minDist;

  function fits(x, y) {
    const gx = Math.floor(x / cellSize);
    const gy = Math.floor(y / cellSize);
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = gx + dx, ny = gy + dy;
        if (nx < 0 || ny < 0 || nx >= gridCols || ny >= gridRows) continue;
        const q = grid[ny * gridCols + nx];
        if (!q) continue;
        const ddx = q.x - x, ddy = q.y - y;
        if (ddx * ddx + ddy * ddy < minDist2) return false;
      }
    }
    return true;
  }
  function add(x, y) {
    const p = { x, y };
    points.push(p); active.push(p);
    grid[Math.floor(y / cellSize) * gridCols + Math.floor(x / cellSize)] = p;
  }
  // Seed somewhere in the middle so the algorithm doesn't propagate from a corner
  add(rectW * (0.3 + Math.random() * 0.4), rectH * (0.3 + Math.random() * 0.4));
  while (active.length > 0 && points.length < maxPoints) {
    const i = Math.floor(Math.random() * active.length);
    const c = active[i];
    let found = false;
    for (let a = 0; a < k; a++) {
      const ang = Math.random() * Math.PI * 2;
      const d = minDist + Math.random() * minDist; // annulus [r, 2r]
      const x = c.x + Math.cos(ang) * d;
      const y = c.y + Math.sin(ang) * d;
      if (x < 0 || y < 0 || x >= rectW || y >= rectH) continue;
      if (fits(x, y)) { add(x, y); found = true; break; }
    }
    if (!found) active.splice(i, 1);
  }
  return points;
}

function generateInitialShapes(count) {
  if (count <= 0 || W <= 0 || H <= 0) return [];
  // Inset the placement rect on each axis independently — `shapeInset` is a
  // fraction of each dimension applied to both sides, so the central rect is
  // (1 - 2·inset) × (1 - 2·inset) of the canvas regardless of aspect ratio.
  const insetFrac = Math.max(0, Math.min(0.4, settings.shapeInset));
  const insetX = W * insetFrac;
  const insetY = H * insetFrac;
  const rectW = Math.max(1, W - 2 * insetX);
  const rectH = Math.max(1, H - 2 * insetY);
  // Shape size is set from the **full canvas area** and `count`, NOT from
  // the inset rect — so changing the margin never shrinks the pieces. A
  // tighter margin just means fewer slots; if the central rect can't hold
  // `count` shapes at this size, the Poisson sampler returns fewer and we
  // place what we can.
  const targetCoverage = 0.95;
  const baseRadius = Math.sqrt(targetCoverage * W * H / count / Math.PI);
  const maxR = Math.max(20, baseRadius);
  const minR = Math.max(20, baseRadius * 0.65);
  // The Poisson constraint: centers at least 2·maxR + gap apart. So even
  // two max-size neighbors can't touch — there's always at least `gap`
  // pixels of clear space between their bounding circles. Smaller gap =
  // tighter packing = more mixing during cuts.
  const gap = Math.max(0, settings.shapeGap || 0);
  const minDist = 2 * maxR + gap;
  // Spiral placement from the center outward, hex-packing density. If the
  // rect can't hold `count` shapes at this size, the spiral stops early
  // and we place fewer (no retry, no shape shrinking).
  const pts = phyllotaxisPlacement(rectW, rectH, minDist, count);
  for (let i = pts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pts[i], pts[j]] = [pts[j], pts[i]];
  }
  const out = [];
  for (const p of pts) {
    const r = minR + Math.random() * Math.max(0, maxR - minR);
    const make = SHAPE_KINDS[Math.floor(Math.random() * SHAPE_KINDS.length)];
    out.push({
      points: make(p.x + insetX, p.y + insetY, r),
      color: settings.strokeColor,
    });
  }
  // Same SAT relaxation we use during cuts: pushes any pair of shapes whose
  // polygons actually overlap (e.g. heptagon vertex protruding into a hex
  // neighbor) until none touch.
  relaxOverlapsInPlace(out);

}

function buildZones(initialShapes) {

    const c = centroid(s.points);
    return { cx: c.x, cy: c.y, radius: boundingRadius(s.points, c) };
  });

function splitPolygon(poly, line) {
  const eps = 1e-7;
  const left = [], right = [];
  const n = poly.length;
  for (let i = 0; i < n; i++) {
    const curr = poly[i];
    const next = poly[(i + 1) % n];
    const dCurr = line.a * curr.x + line.b * curr.y + line.c;
    const dNext = line.a * next.x + line.b * next.y + line.c;
    if (dCurr >= -eps) left.push({ x: curr.x, y: curr.y });
    if (dCurr <= eps) right.push({ x: curr.x, y: curr.y });
    if ((dCurr > eps && dNext < -eps) || (dCurr < -eps && dNext > eps)) {
      const t = dCurr / (dCurr - dNext);
      const inter = {
        x: curr.x + t * (next.x - curr.x),
        y: curr.y + t * (next.y - curr.y)
      };
      left.push({ x: inter.x, y: inter.y });
      right.push({ x: inter.x, y: inter.y });
    }
  }
  if (left.length < 3 || right.length < 3) return null;
  return [left, right];
}

// World coords visible through current camera
function visibleRect() {
  const halfW = (W / 2) / camera.scale;
  const halfH = (H / 2) / camera.scale;
  return {
    x0: camera.cx - halfW,
    y0: camera.cy - halfH,
    x1: camera.cx + halfW,
    y1: camera.cy + halfH,
  };

function makeRandomCutLineAt(c) {
  const angle = Math.random() * Math.PI * 2;
  const dx = Math.cos(angle), dy = Math.sin(angle);
  const v = visibleRect();
  const ts = [];
  if (Math.abs(dx) > 1e-9) { ts.push((v.x0 - c.x) / dx); ts.push((v.x1 - c.x) / dx); }
  if (Math.abs(dy) > 1e-9) { ts.push((v.y0 - c.y) / dy); ts.push((v.y1 - c.y) / dy); }
  const valid = ts.filter(t => {
    const x = c.x + t * dx, y = c.y + t * dy;
    return x >= v.x0 - 0.5 && x <= v.x1 + 0.5 && y >= v.y0 - 0.5 && y <= v.y1 + 0.5;
  }).sort((u, w) => u - w);
  if (valid.length < 2) return null;
  const t1 = valid[0], t2 = valid[valid.length - 1];
  const p1 = { x: c.x + t1 * dx, y: c.y + t1 * dy };
  const p2 = { x: c.x + t2 * dx, y: c.y + t2 * dy };
  const na = -dy, nb = dx;

  if (!targetShape) return null;
  return makeRandomCutLineAt(finalCentroid(targetShape));
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.scale + camera.cx,
    y: (sy - H / 2) / camera.scale + camera.cy,

// ---------- SAT collision ----------
function getAxes(pts) {
  const axes = [];
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const p1 = pts[i], p2 = pts[(i + 1) % n];
    const ex = p2.x - p1.x, ey = p2.y - p1.y;
    const len = Math.hypot(ex, ey) || 1;
    axes.push({ x: -ey / len, y: ex / len });
  }
