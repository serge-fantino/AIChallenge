}
function projectOnto(pts, ax) {
  let mn = Infinity, mx = -Infinity;
  for (const p of pts) {
    const d = p.x * ax.x + p.y * ax.y;
    if (d < mn) mn = d;
    if (d > mx) mx = d;
  }
  return [mn, mx];
}
// In-place SAT relaxation: pushes overlapping shapes apart so none of their
// polygons intersect. Uses the same AABB broad-phase + MTV approach as the
// cut-time relaxation in applyCut, but mutates `s.points` directly instead
// of accumulating offsets on items.
function relaxOverlapsInPlace(shapesArr, maxIter) {
  const N = shapesArr.length;
  if (N < 2) return;
  const ax0 = new Float64Array(N), ay0 = new Float64Array(N);
  const ax1 = new Float64Array(N), ay1 = new Float64Array(N);
  for (let i = 0; i < N; i++) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    const pts = shapesArr[i].points;
    for (let k = 0; k < pts.length; k++) {
      const p = pts[k];
      if (p.x < x0) x0 = p.x;
      if (p.x > x1) x1 = p.x;
      if (p.y < y0) y0 = p.y;
      if (p.y > y1) y1 = p.y;
    }
    ax0[i] = x0; ay0[i] = y0; ax1[i] = x1; ay1[i] = y1;
  }
  const ITERS = maxIter || 60;
  for (let iter = 0; iter < ITERS; iter++) {
    let any = false;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        if (ax1[i] < ax0[j] || ax1[j] < ax0[i] ||
            ay1[i] < ay0[j] || ay1[j] < ay0[i]) continue;
        const v = mtv(shapesArr[i].points, shapesArr[j].points);
        if (!v) continue;
        any = true;
        const hx = v.x * 0.5, hy = v.y * 0.5;
        const ti = shapesArr[i].points, tj = shapesArr[j].points;
        for (let k = 0; k < ti.length; k++) { ti[k].x += hx; ti[k].y += hy; }
        for (let k = 0; k < tj.length; k++) { tj[k].x -= hx; tj[k].y -= hy; }
        ax0[i] += hx; ax1[i] += hx; ay0[i] += hy; ay1[i] += hy;
        ax0[j] -= hx; ax1[j] -= hx; ay0[j] -= hy; ay1[j] -= hy;
      }
    }
    if (!any) break;
  }
}

function mtv(polyA, polyB) {
  const axes = getAxes(polyA).concat(getAxes(polyB));
  let minOverlap = Infinity, axis = null;
  for (const ax of axes) {
    const [a1, a2] = projectOnto(polyA, ax);
    const [b1, b2] = projectOnto(polyB, ax);
    const o = Math.min(a2, b2) - Math.max(a1, b1);
    if (o <= 0.5) return null;
    if (o < minOverlap) { minOverlap = o; axis = ax; }
  }
  const ca = centroid(polyA), cb = centroid(polyB);
  if ((ca.x - cb.x) * axis.x + (ca.y - cb.y) * axis.y < 0) {
    axis = { x: -axis.x, y: -axis.y };
  }
  return { x: axis.x * minOverlap, y: axis.y * minOverlap };
}

// ---------- easings ----------
function elasticOut(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  const c4 = (2 * Math.PI) / 3;
  return Math.pow(2, -settings.elasticity * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
}
function easeInOut(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// ---------- per-point animation modes ----------
// All variants write into the provided `out` object ({x, y}) instead of
// allocating, which matters at 60 fps with many animating points.
function rigidPointInto(p, anim, out) {
  const e = elasticOut(anim.t);
  const ox = anim.targetDx * e;
  const oy = anim.targetDy * e;
  const angle = anim.startAngle * (1 - e);
  if (angle === 0) {
    out.x = p.x + ox; out.y = p.y + oy;
    return;
  }
  const cosA = Math.cos(angle), sinA = Math.sin(angle);
  const dx = p.x - anim.pivot.x;
  const dy = p.y - anim.pivot.y;
  out.x = anim.pivot.x + ox + dx * cosA - dy * sinA;
  out.y = anim.pivot.y + oy + dx * sinA + dy * cosA;
}

function delayedInto(p, anim, relDist, out) {
  const startT = relDist * anim.spread;
  const denom = 1 - startT;
  const localT = denom > 0
    ? Math.max(0, Math.min(1, (anim.t - startT) / denom))
    : (anim.t >= startT ? 1 : 0);
  const e = elasticOut(localT);
  out.x = p.x + anim.targetDx * e;
  out.y = p.y + anim.targetDy * e;
}

function jellyInto(p, anim, out) {
  const d = Math.abs(anim.line.a * p.x + anim.line.b * p.y + anim.line.c);
  const rel = anim.maxDist > 0 ? d / anim.maxDist : 0;
  delayedInto(p, anim, rel, out);
}

function waveInto(p, anim, out) {
  const dx = p.x - anim.pivot.x, dy = p.y - anim.pivot.y;
  const tDot = dx * (-anim.line.b) + dy * anim.line.a;
  const range = anim.maxAlong - anim.minAlong;
  const rel = range > 0 ? (tDot - anim.minAlong) / range : 0;
  delayedInto(p, anim, rel, out);
}

function squashInto(p, anim, out) {
  const e = elasticOut(anim.t);
  const ox = anim.targetDx * e;
  const oy = anim.targetDy * e;
  const pulse = anim.t < 0.6 ? Math.sin((anim.t / 0.6) * Math.PI) : 0;
  const stretch = 1 + 0.45 * pulse;
  const squeeze = 1 - 0.22 * pulse;
  const cx = anim.pivot.x, cy = anim.pivot.y;
  const dx = p.x - cx, dy = p.y - cy;
  const nDot = dx * anim.line.a + dy * anim.line.b;
  const tDot = dx * (-anim.line.b) + dy * anim.line.a;
  const nNew = nDot * stretch;
  const tNew = tDot * squeeze;
  out.x = cx + ox + nNew * anim.line.a - tNew * anim.line.b;
  out.y = cy + oy + nNew * anim.line.b + tNew * anim.line.a;
}

function animatedPointInto(p, anim, out) {
  switch (anim.mode) {
    case 'jelly':  jellyInto(p, anim, out); break;
    case 'wave':   waveInto(p, anim, out); break;
    case 'squash': squashInto(p, anim, out); break;
    default:       rigidPointInto(p, anim, out); break;
  }
}

// ---------- camera ----------
function animateCamera(target, duration, onDone) {
  cameraAnim = { from: { ...camera }, to: target, t: 0, duration, onDone };
}
function updateCamera(dt) {
  if (!cameraAnim) return;
  cameraAnim.t = Math.min(1, cameraAnim.t + dt / cameraAnim.duration);
  const e = easeInOut(cameraAnim.t);
  camera.cx = cameraAnim.from.cx + (cameraAnim.to.cx - cameraAnim.from.cx) * e;
  camera.cy = cameraAnim.from.cy + (cameraAnim.to.cy - cameraAnim.from.cy) * e;
  camera.scale = cameraAnim.from.scale + (cameraAnim.to.scale - cameraAnim.from.scale) * e;
  if (cameraAnim.t >= 1) {
    const cb = cameraAnim.onDone;
    cameraAnim = null;
    if (cb) cb();
  }
}

// ---------- zone-based selection ----------
function shapesInZone(zone, extra = ZONE_TOLERANCE) {
  return shapes.filter(s => {
    if (!isCuttable(s)) return false;
    const c = finalCentroid(s);
    return Math.hypot(c.x - zone.cx, c.y - zone.cy) <= zone.radius + extra;
  });
}

function pickZoneWithCuttableShapes() {
  const candidates = zones.filter(z => shapesInZone(z).length > 0);
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function pickShapeInZone(zone) {
  return preferCenter(shapesInZone(zone));
}

function cameraForPoint(p, worldRadius) {
  const r = worldRadius != null ? worldRadius : 150;
  const screenPad = settings.camPadding;
  const sX = (W - 2 * screenPad) / (2 * r);
  const sY = (H - 2 * screenPad) / (2 * r);
  const scale = Math.max(1, Math.min(sX, sY, settings.camMaxZoom));
  return { cx: p.x, cy: p.y, scale };
}

function cameraForShape(s) {
  const c = finalCentroid(s);
  const r = getBoundingRadius(s);
  // padding interpreted as screen pixels so it stays consistent at high zoom
  const screenPad = settings.camPadding;
  const sX = (W - 2 * screenPad) / (2 * r);
  const sY = (H - 2 * screenPad) / (2 * r);
  return { cx: c.x, cy: c.y, scale: Math.max(1, Math.min(sX, sY)) };
}

// Prefer shapes whose centroid lies inside the central 20% radius of the
// visible region; fall back to the full pool if nothing matches.
function preferCenter(candidates) {
  if (candidates.length === 0) return null;
  const v = visibleRect();
  const cx = (v.x0 + v.x1) / 2;
  const cy = (v.y0 + v.y1) / 2;
  const r = 0.2 * Math.min(v.x1 - v.x0, v.y1 - v.y0);
  const inCircle = candidates.filter(s => {
    const c = finalCentroid(s);
    return Math.hypot(c.x - cx, c.y - cy) <= r;
  });
  const pool = inCircle.length > 0 ? inCircle : candidates;
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickVisibleCuttable() {
  const v = visibleRect();
  const candidates = shapes.filter(s => {
    if (!isCuttable(s)) return false;
    const c = finalCentroid(s);
    return c.x >= v.x0 && c.x <= v.x1 && c.y >= v.y0 && c.y <= v.y1;
  });
  return preferCenter(candidates);
}

function pickLargestVisible() {
  const v = visibleRect();
  let best = null, bestArea = 0;
  for (const s of shapes) {
    if (!isCuttable(s)) continue;
    const c = finalCentroid(s);
    if (c.x < v.x0 || c.x > v.x1 || c.y < v.y0 || c.y > v.y1) continue;
    const a = area(s.points);
    if (a > bestArea) { bestArea = a; best = s; }
  }
  return best;
}

function cameraForZone(zone) {
  const padding = settings.camPadding;
  const candidates = shapesInZone(zone, padding);
  let x0, y0, x1, y1;
  if (candidates.length > 0) {
    x0 = Infinity; y0 = Infinity; x1 = -Infinity; y1 = -Infinity;
    for (const s of candidates) {
      const c = finalCentroid(s);
      const r = getBoundingRadius(s);
      x0 = Math.min(x0, c.x - r); y0 = Math.min(y0, c.y - r);
      x1 = Math.max(x1, c.x + r); y1 = Math.max(y1, c.y + r);
    }
  } else {
    x0 = zone.cx - zone.radius; y0 = zone.cy - zone.radius;
    x1 = zone.cx + zone.radius; y1 = zone.cy + zone.radius;
  }
  const w = (x1 - x0) + 2 * padding;
  const h = (y1 - y0) + 2 * padding;
  const scale = Math.min(W / w, H / h, settings.camMaxZoom);
  return {
    cx: (x0 + x1) / 2,
    cy: (y0 + y1) / 2,
    scale: Math.max(scale, 1),
  };
}

// ---------- cut state ----------
function startCutOnShape(targetShape) {
  const line = makeRandomCutLineThrough(targetShape);
  if (!line) return false;
  const lineColor = `hsl(${Math.random() * 360}, 80%, 50%)`;
  cutState = { phase: 'draw', t: 0, line, lineColor, lineColorRGB: parseHSL(lineColor) };
  audio.laser();
  return true;
}

function startCutAtPoint(worldPoint) {
  const line = makeRandomCutLineAt(worldPoint);
  if (!line) return false;
  const lineColor = `hsl(${Math.random() * 360}, 80%, 50%)`;
  cutState = { phase: 'draw', t: 0, line, lineColor, lineColorRGB: parseHSL(lineColor) };
  audio.laser();
  return true;
}

function finalizeAnim(s) {
  if (!s.anim) return;
  for (const p of s.points) {
    p.x += s.anim.targetDx;
    p.y += s.anim.targetDy;
  }
  s.anim = null;
}

function pickK(arr, k) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, k);
}

function applyCut(line) {
  for (const s of shapes) finalizeAnim(s);
  const items = [];
  for (const s of shapes) {
    if (!isCuttable(s)) {
      items.push({ basePoints: s.points, color: s.color, fade: s.fade || null,
        dx: 0, dy: 0, spin: 0, isCut: false });
      continue;
    }
    const result = splitPolygon(s.points, line);
    if (!result) {
      items.push({ basePoints: s.points, color: s.color, fade: s.fade || null,
        dx: 0, dy: 0, spin: 0, isCut: false });
      continue;
    }
    const [a, b] = result;
    // separation is in world coords; divide by current scale so the visual
    // separation in screen pixels stays roughly constant at any zoom level
    const sepScale = camera.scale;
    const sepMin = (settings.separation * 0.25) / sepScale;
    const sepMax = settings.separation / sepScale;
    const sep = sepMin + Math.random() * (sepMax - sepMin);
    const ca = centroid(a);
    const sideA = line.a * ca.x + line.b * ca.y + line.c;
    const dir = sideA >= 0 ? 1 : -1;
    const spin = (0.1 + Math.random() * 0.2) * (Math.random() < 0.5 ? 1 : -1);
    const fadeA = s.fade ? { ...s.fade } : null;
    const fadeB = s.fade ? { ...s.fade } : null;
    items.push({ basePoints: a, color: s.color, fade: fadeA,
      dx: dir * line.a * sep, dy: dir * line.b * sep, spin, isCut: true });
    items.push({ basePoints: b, color: s.color, fade: fadeB,
      dx: -dir * line.a * sep, dy: -dir * line.b * sep, spin: -spin, isCut: true });
  }
  const targets = items.map(it => it.basePoints.map(p => ({ x: p.x + it.dx, y: p.y + it.dy })));
  // AABB broad-phase: per-item bounding box, updated incrementally on push
  const N = items.length;
  const ax0 = new Float64Array(N), ay0 = new Float64Array(N);
  const ax1 = new Float64Array(N), ay1 = new Float64Array(N);
  for (let i = 0; i < N; i++) {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    const pts = targets[i];
    for (let k = 0; k < pts.length; k++) {
      const p = pts[k];
      if (p.x < x0) x0 = p.x;
      if (p.x > x1) x1 = p.x;
      if (p.y < y0) y0 = p.y;
      if (p.y > y1) y1 = p.y;
    }
    ax0[i] = x0; ay0[i] = y0; ax1[i] = x1; ay1[i] = y1;
  }
  const MAX_ITER = 40;
  for (let iter = 0; iter < MAX_ITER; iter++) {
    let any = false;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        // broad-phase reject
        if (ax1[i] < ax0[j] || ax1[j] < ax0[i] ||
            ay1[i] < ay0[j] || ay1[j] < ay0[i]) continue;
        const v = mtv(targets[i], targets[j]);
        if (!v) continue;
        any = true;
        const hx = v.x * 0.5, hy = v.y * 0.5;
        items[i].dx += hx; items[i].dy += hy;
        items[j].dx -= hx; items[j].dy -= hy;
        const ti = targets[i], tj = targets[j];
        for (let k = 0; k < ti.length; k++) { ti[k].x += hx; ti[k].y += hy; }
        for (let k = 0; k < tj.length; k++) { tj[k].x -= hx; tj[k].y -= hy; }
        ax0[i] += hx; ax1[i] += hx; ay0[i] += hy; ay1[i] += hy;
        ax0[j] -= hx; ax1[j] -= hx; ay0[j] -= hy; ay1[j] -= hy;
      }
    }
    if (!any) break;
  }
  const next = [];
  const newCutIndices = [];
  for (const item of items) {
    const moves = item.isCut || Math.abs(item.dx) > 0.5 || Math.abs(item.dy) > 0.5 || item.spin !== 0;
    const shape = { points: item.basePoints, color: item.color, fade: item.fade };
    if (moves) {
      const c = centroid(item.basePoints);
      const mode = item.isCut ? settings.cutMode : 'rigid';
      // for jelly/wave/squash, suppress spin (per-point effects shine without rotation noise)
      const startAngle = (mode === 'rigid') ? item.spin : 0;
      // precompute distances to the cut line for the per-point modes
      let maxDist = 0, minAlong = Infinity, maxAlong = -Infinity;
      if (line && (mode === 'jelly' || mode === 'wave' || mode === 'squash')) {
        for (const p of item.basePoints) {
          const d = Math.abs(line.a * p.x + line.b * p.y + line.c);
          if (d > maxDist) maxDist = d;
          const dx = p.x - c.x, dy = p.y - c.y;
          const t = dx * (-line.b) + dy * line.a;
          if (t < minAlong) minAlong = t;
          if (t > maxAlong) maxAlong = t;
        }
      }
      shape.anim = {
        targetDx: item.dx, targetDy: item.dy,
        startAngle, pivot: c,
        t: 0, duration: settings.animDuration,
        mode, line, maxDist, minAlong, maxAlong,
        spread: settings.jellySpread,
      };
    }
    next.push(shape);
    if (item.isCut) newCutIndices.push(next.length - 1);
  }
  const k = Math.max(0, Math.min(settings.colorCount, newCutIndices.length));
  const fadeSpan = Math.max(0, settings.fadeMax - settings.fadeMin);
  for (const idx of pickK(newCutIndices, k)) {
    next[idx].color = cutState.lineColor;
    next[idx].fade = {
      startRGB: cutState.lineColorRGB.slice(),
      elapsed: 0,
      duration: settings.fadeMin + Math.random() * fadeSpan
    };
  }
  shapes = next;
  if (newCutIndices.length > 0) audio.shatter();
}

function startPanOut() {
  cinematicState.phase = 'panOut';
  animateCamera(identityCamera(), settings.camPanDuration, () => {
    cinematicState = null;
    // PLAY mode shouldn't gate on an overview pause — clicks should restart
    // the cycle as soon as the camera is back at identity.
    nextCutDelay = settings.interactive ? 0 : settings.camOverviewHold;
  });
}

function pickCutCount() {
  const min = Math.max(1, settings.camCuts);
  const max = Math.max(min, settings.camCutsMax);
  return min + Math.floor(Math.random() * (max - min + 1));
}

function zoomDeeperOrReset() {
  const next = pickLargestVisible();
  if (!next) { startPanOut(); return; }
  const targetCam = cameraForShape(next);
  // bail out if we're not making meaningful progress, or zoom is getting silly
  if (targetCam.scale <= camera.scale * 1.05 || targetCam.scale > 250) {
    startPanOut();
    return;
  }
  cinematicState.phase = 'panIn';
  cinematicState.cutsRemaining = pickCutCount();
  animateCamera(targetCam, settings.camPanDuration, () => {
    if (cinematicState) cinematicState.phase = 'cutting';
  });
}

function zoomDeeperInteractive() {
  const next = pickLargestVisible();
  if (!next) { startPanOut(); return; }
  const targetCam = cameraForShape(next);
  if (targetCam.scale <= camera.scale * 1.05 || targetCam.scale > 250) {
    startPanOut();
    return;
  }
  cinematicState.phase = 'panIn';
  cinematicState.cutsRemaining = pickCutCount();
  animateCamera(targetCam, settings.camPanDuration, () => {
    if (cinematicState) cinematicState.phase = 'cutting';
  });
}

function interactiveTick() {
  if (cinematicState) {
    if (!cinematicState.interactivePoint) { cinematicState = null; return; }
    if (cinematicState.phase === 'pendingPanIn') {
      cinematicState.phase = 'panIn';
      animateCamera(cameraForPoint(cinematicState.interactivePoint), settings.camPanDuration, () => {
        if (cinematicState) cinematicState.phase = 'cutting';
      });
      return;
    }
    if (cinematicState.phase === 'cutting') {
      // Level done? advance based on mode.
      if (cinematicState.cutsRemaining <= 0) {
        if (settings.cameraMode === 'zoom') zoomDeeperInteractive();
        else startPanOut();
        return;
      }
      // Wait for the user to click — every cut is click-driven.
      if (!pendingClick) return;
      const c = pendingClick;
      pendingClick = null;
      if (startCutAtPoint(c)) cinematicState.cutsRemaining--;
      return;
    }
    // panIn / panOut animations in flight: just wait.
    return;
  }
  // Idle: wait for the first click of a new cycle.
  if (!pendingClick) return;
  const c = pendingClick;
  pendingClick = null;
  // Step 1: acknowledge the click with an immediate cut in the current view.
  if (!startCutAtPoint(c)) return;
  // Step 2: fix mode never zooms; degenerate camCuts <= 1 = nothing to follow.
  if (settings.cameraMode === 'fix') return;
  const extraCuts = Math.max(0, pickCutCount() - 1);
  if (extraCuts === 0) return;
  // Step 3: queue the pan-in (runs once the click cut finishes); subsequent
  // cuts in the zoomed view will all be triggered by further clicks.
  cinematicState = {
    phase: 'pendingPanIn',
    interactivePoint: c,
    cutsRemaining: extraCuts,
  };
}

function scheduleNextCut() {
  if (settings.interactive) { interactiveTick(); return; }
  const mode = settings.cameraMode;
  if (mode === 'fix') {
    const zone = pickZoneWithCuttableShapes();
    if (!zone) return;
    const target = pickShapeInZone(zone);
    if (target) startCutOnShape(target);
    return;
  }
  if (mode === 'pan') {
    if (!cinematicState) {
      const zone = pickZoneWithCuttableShapes();
      if (!zone) return;
      cinematicState = {
        phase: 'panIn', zone,
        cutsRemaining: pickCutCount(),
      };
      animateCamera(cameraForZone(zone), settings.camPanDuration, () => {
        if (cinematicState) cinematicState.phase = 'cutting';
      });
      return;
    }
    if (cinematicState.phase === 'cutting') {
      if (cinematicState.cutsRemaining > 0) {
        const target = pickShapeInZone(cinematicState.zone);
        if (target && startCutOnShape(target)) {
          cinematicState.cutsRemaining--;
        } else {
          startPanOut();
        }
      } else {
        startPanOut();
      }
    }
    return;
  }
  if (mode === 'zoom') {
    if (!cinematicState) {
      const zone = pickZoneWithCuttableShapes();
      if (!zone) return;
      cinematicState = {
        phase: 'panIn',
        cutsRemaining: pickCutCount(),
      };
      animateCamera(cameraForZone(zone), settings.camPanDuration, () => {
        if (cinematicState) cinematicState.phase = 'cutting';
      });
      return;
    }
    if (cinematicState.phase === 'cutting') {
      if (cinematicState.cutsRemaining > 0) {
        const target = pickVisibleCuttable();
        if (target && startCutOnShape(target)) {
          cinematicState.cutsRemaining--;
        } else {
          zoomDeeperOrReset();
        }
      } else {
        zoomDeeperOrReset();
      }
    }
  }
}

// ---------- update / render ----------
function update(dt) {
  updateCamera(dt);
  audio.ensureWind(cameraAnim !== null);
  const nrgb = neutralRGB();
  const neutralStr = settings.strokeColor;
  for (const s of shapes) {
    if (s.anim && s.anim.t < 1) {
      s.anim.t = Math.min(1, s.anim.t + dt / s.anim.duration);
      if (s.anim.t >= 1) {
        const dx = s.anim.targetDx, dy = s.anim.targetDy;
        for (const p of s.points) {
          p.x += dx;
          p.y += dy;
        }
        if (s._centroid) { s._centroid.x += dx; s._centroid.y += dy; }
        // _boundingRadius unchanged under uniform translation
        s.anim = null;
      }
    }
    if (s.fade) {
      s.fade.elapsed += dt;
      const t = Math.min(1, s.fade.elapsed / s.fade.duration);
      const r = s.fade.startRGB[0] + (nrgb[0] - s.fade.startRGB[0]) * t;
      const g = s.fade.startRGB[1] + (nrgb[1] - s.fade.startRGB[1]) * t;
      const b = s.fade.startRGB[2] + (nrgb[2] - s.fade.startRGB[2]) * t;
      s.color = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
      if (t >= 1) { s.color = neutralStr; s.fade = null; }
    } else {
      s.color = neutralStr;
    }
  }
  if (cutState) {
    cutState.t += dt;
    if (cutState.phase === 'draw' && cutState.t >= settings.lineSpeed) {
      cutState.phase = 'split'; cutState.t = 0;
      applyCut(cutState.line);
    } else if (cutState.phase === 'split' && cutState.t >= settings.splitPhase) {
      cutState.phase = 'fade'; cutState.t = 0;
    } else if (cutState.phase === 'fade' && cutState.t >= settings.lineSpeed) {
      cutState.phase = 'pause'; cutState.t = 0;
    } else if (cutState.phase === 'pause' && cutState.t >= settings.pausePhase) {
      cutState = null;
    }
  }
  if (!cutState && !cameraAnim) {
    if (nextCutDelay > 0) {
      nextCutDelay -= dt;
    } else {
      scheduleNextCut();
    }
  }
}

// World-coords-per-screen-pixel factor for a given shape. With
// proportionalStroke off, this is just 1/scale (constant on-screen size).
// With it on, it becomes worldRadius/refRadius — so on-screen size scales
// linearly with the shape's on-screen radius (camera.scale cancels out).
function shapeStrokeFactor(s) {
  if (!settings.proportionalStroke) return 1 / camera.scale;
  // Proportional: on-screen size scales with the shape's on-screen radius,
  // but capped so it never exceeds strokeMaxWidth pixels on screen.
  const onScreenRadius = getBoundingRadius(s) * camera.scale;
  const refRadius = Math.max(1, settings.strokeRefRadius);
  let multiplier = onScreenRadius / refRadius;
  const maxMult = settings.strokeMaxWidth / Math.max(0.1, settings.strokeWidth);
  if (multiplier > maxMult) multiplier = maxMult;
  // Convert the on-screen multiplier to world coords for ctx.lineWidth.
  return multiplier / camera.scale;
}

function applyStrokeStyle(f) {
  const style = settings.strokeStyle;
  if (style === 'dashed') ctx.setLineDash([12 * f, 8 * f]);
  else if (style === 'dotted') ctx.setLineDash([2 * f, 6 * f]);
  else ctx.setLineDash([]);
}

// Reusable buffer of {x, y} for visible polygon points; resized on demand.
const visBuf = [];
function ensureVisBuf(n) {
  while (visBuf.length < n) visBuf.push({ x: 0, y: 0 });
}

function drawShape(s) {
  const pts = s.points;
  const n = pts.length;
  const anim = s.anim;
  ensureVisBuf(n);
  if (anim) {
    for (let i = 0; i < n; i++) animatedPointInto(pts[i], anim, visBuf[i]);
  } else {
    for (let i = 0; i < n; i++) {
      visBuf[i].x = pts[i].x; visBuf[i].y = pts[i].y;
    }
  }
  // outline
  ctx.beginPath();
  ctx.moveTo(visBuf[0].x, visBuf[0].y);
  for (let i = 1; i < n; i++) ctx.lineTo(visBuf[i].x, visBuf[i].y);
  ctx.closePath();
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.strokeStyle = s.color;
  const f = shapeStrokeFactor(s);
  ctx.lineWidth = settings.strokeWidth * f;
  applyStrokeStyle(f);
  ctx.stroke();
  ctx.setLineDash([]);
  // rivets — single beginPath/fill per shape
  if (settings.strokeStyle === 'rivets') {
    ctx.fillStyle = '#5c5c5c';
    const spacing = DOT_SPACING * f;
    const r = 1.2 * f;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const p1 = visBuf[i], p2 = visBuf[(i + 1) % n];
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy);
      if (len < spacing * 1.2) continue;
      const count = Math.max(1, Math.floor(len / spacing));
      for (let k = 1; k < count; k++) {
        const t = k / count;
        const x = p1.x + dx * t;
        const y = p1.y + dy * t;
        ctx.moveTo(x + r, y);
        ctx.arc(x, y, r, 0, Math.PI * 2);
      }
    }
    ctx.fill();
  }
}

function drawCutLine() {
  if (!cutState) return;
  const { line, phase, t, lineColor } = cutState;
  const { p1, p2 } = line;
  let alpha = 1, progress = 1;
  if (phase === 'draw') progress = t / settings.lineSpeed;
  else if (phase === 'fade') alpha = 1 - t / settings.lineSpeed;
  else if (phase === 'pause') alpha = 0;
  // glow alpha: ramps in with the line, then fades quickly during the split phase
  let glowAlpha = 0;
  if (phase === 'draw') glowAlpha = progress;
  else if (phase === 'split') glowAlpha = Math.max(0, 1 - t / settings.glowDecay);
  const ex = p1.x + (p2.x - p1.x) * progress;
  const ey = p1.y + (p2.y - p1.y) * progress;
  const baseLW = 2.5 / camera.scale;
  ctx.save();
  ctx.lineCap = 'round';
  if (settings.glow > 0 && glowAlpha > 0) {
    const glowCol = glowColorFor(lineColor);
    // outer halo: wide, very transparent
    ctx.strokeStyle = glowCol;
    ctx.lineWidth = baseLW + settings.glow / camera.scale;
    ctx.globalAlpha = alpha * glowAlpha * 0.18 * settings.glowIntensity;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    // inner halo: narrower, brighter
    ctx.lineWidth = baseLW + (settings.glow * 0.4) / camera.scale;
    ctx.globalAlpha = alpha * glowAlpha * 0.42 * settings.glowIntensity;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(ex, ey);
    ctx.stroke();
  }
  // main line
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = baseLW;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.restore();
}

function shapeIsVisible(s, v) {
  const c = getCentroid(s);
  let r = getBoundingRadius(s);
  if (s.anim) r += Math.hypot(s.anim.targetDx, s.anim.targetDy);
  return c.x + r >= v.x0 && c.x - r <= v.x1
      && c.y + r >= v.y0 && c.y - r <= v.y1;
}

function render(opts) {
  ctx.clearRect(0, 0, W, H);
  if (opts && opts.fillBackground) {
    ctx.fillStyle = settings.bgColor;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(camera.scale, camera.scale);
  ctx.translate(-camera.cx, -camera.cy);
  const v = visibleRect();
  for (const s of shapes) {
    if (!shapeIsVisible(s, v)) continue;
    drawShape(s);
  }
  if (!opts || opts.drawCutLine !== false) drawCutLine();
  ctx.restore();
}

// ---------- perf stats / HUD ----------
const perfStats = {
  frameTimes: new Array(60).fill(16.6),
  idx: 0,
  filled: false,
  bestFps: 0,
};
function recordFrame(ms) {
  perfStats.frameTimes[perfStats.idx] = ms;
  perfStats.idx = (perfStats.idx + 1) % perfStats.frameTimes.length;
  if (perfStats.idx === 0) perfStats.filled = true;
}
const hudEls = {
  count: null, fps: null, deg: null,
};
let hudTickCounter = 0;
function updateHUD() {
  hudTickCounter++;
  if (hudTickCounter < 8) return; // ~7Hz refresh
  hudTickCounter = 0;
  if (!hudEls.count) {
    hudEls.count = document.getElementById('hud_count');
    hudEls.fps   = document.getElementById('hud_fps');
    hudEls.deg   = document.getElementById('hud_deg');
  }
  const ft = perfStats.frameTimes;
  let sum = 0;
  for (let i = 0; i < ft.length; i++) sum += ft[i];
  const avgMs = sum / ft.length;
  const fps = 1000 / avgMs;
  if (perfStats.filled && fps > perfStats.bestFps) perfStats.bestFps = fps;
  const ratio = perfStats.bestFps > 0 ? fps / perfStats.bestFps : 1;
  hudEls.count.textContent = String(shapes.length);
  hudEls.fps.textContent = fps.toFixed(0) + ' fps · ' + avgMs.toFixed(1) + 'ms';
  hudEls.deg.textContent = perfStats.bestFps > 0 && perfStats.filled
    ? Math.round(ratio * 100) + '%'
    : '—';
  hudEls.fps.className = 'hud-value';
  hudEls.deg.className = 'hud-value';
  if (ratio < 0.5)      { hudEls.fps.classList.add('bad');  hudEls.deg.classList.add('bad'); }
  else if (ratio < 0.8) { hudEls.fps.classList.add('warn'); hudEls.deg.classList.add('warn'); }
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(50, now - lastTime);
  lastTime = now;
  recordFrame(dt); // real time — HUD measures actual perf
  if (isPaused()) {
    // crop mode: freeze sim, keep wind silent, draw without cut line
    audio.ensureWind(false);
    render({ drawCutLine: false });
  } else {
    // simulation time scales with the speed multiplier; everything that
    // accumulates dt (anim.t, fade.elapsed, cutState.t, cameraAnim.t,
    // nextCutDelay) runs proportionally faster.
    update(dt * (settings.speed || 1));
    render();
  }
  updateHUD();
  requestAnimationFrame(loop);
}

function reset() {
  shapes = generateInitialShapes(settings.shapeCount);
  zones = buildZones(shapes);
  cutState = null;
  cinematicState = null;
  cameraAnim = null;
  camera = identityCamera();
  nextCutDelay = FIRST_CUT_DELAY;
}

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'r' || e.key === 'R') { e.preventDefault(); reset(); }
});
// ---------- gestures: 2-finger pan/pinch + trackpad wheel ----------
function panBy(dxScreen, dyScreen) {
  camera.cx -= dxScreen / camera.scale;
  camera.cy -= dyScreen / camera.scale;
}
function zoomAt(sx, sy, factor) {
  const before = screenToWorld(sx, sy);
  camera.scale = Math.max(0.3, Math.min(500, camera.scale * factor));
  const after = screenToWorld(sx, sy);
  camera.cx += before.x - after.x;
  camera.cy += before.y - after.y;
}
function interruptAuto() {
  cameraAnim = null;
  cinematicState = null;
  // In DEMO mode, hold the auto cycle for a bit so it doesn't immediately
  // override the user's view. In PLAY mode the auto loop isn't running, so
  // make sure clicks aren't gated either.
  nextCutDelay = settings.interactive ? 0 : GESTURE_INACTIVITY_DELAY;
}

let touchPair = null;
function pairInfo(touches) {
  const t0 = touches[0], t1 = touches[1];
  return {
    x: (t0.clientX + t1.clientX) / 2,
    y: (t0.clientY + t1.clientY) / 2,
    d: Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY),
  };
}
let suppressClickUntil = 0;

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  if (e.ctrlKey || e.metaKey) {
    // pinch on trackpad (Mac surfaces it as ctrl+wheel) or modifier+wheel
    const factor = Math.exp(-e.deltaY * 0.01);
    zoomAt(sx, sy, factor);
  } else {
    panBy(-e.deltaX, -e.deltaY);
  }
  interruptAuto();
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length >= 2) {
    e.preventDefault();
    touchPair = pairInfo(e.touches);
    suppressClickUntil = performance.now() + 400;
    interruptAuto();
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!touchPair || e.touches.length < 2) return;
  e.preventDefault();
  const cur = pairInfo(e.touches);
  panBy(cur.x - touchPair.x, cur.y - touchPair.y);
  if (touchPair.d > 0) {
    const rect = canvas.getBoundingClientRect();
    zoomAt(cur.x - rect.left, cur.y - rect.top, cur.d / touchPair.d);
  }
  touchPair = cur;
  suppressClickUntil = performance.now() + 400;
  interruptAuto();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) touchPair = null;
});
canvas.addEventListener('touchcancel', () => { touchPair = null; });

canvas.addEventListener('click', e => {
  if (performance.now() < suppressClickUntil) return; // tail of a multi-touch
  if (settings.interactive) {
    const rect = canvas.getBoundingClientRect();
    pendingClick = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  } else {
    reset();
  }
});

// ---------- panel wiring ----------
function fmtMs(v) { return v + 'ms'; }
function fmtPx(v) { return v + 'px'; }
function fmtSec(v) { return (v / 1000).toFixed(1) + 's'; }
function fmtNum(v) { return String(v); }
function fmtFloat(v) { return v.toFixed(1); }
function fmtFloat2(v) { return v.toFixed(2); }
function fmtPct(v) { return Math.round(v * 100) + '%'; }

const widgetSyncs = [];

function bindRange(id, key, fmt, onChange) {
  const el = document.getElementById(id);
  const val = document.getElementById('v_' + id.slice(2));
  const sync = () => {
    el.value = settings[key];
    if (val) val.textContent = fmt(settings[key]);
  };
  sync();
  el.addEventListener('input', () => {
    settings[key] = +el.value;
    if (val) val.textContent = fmt(settings[key]);
    if (onChange) onChange();
    saveSettings();
  });
  widgetSyncs.push(sync);
}
function bindColor(id, key, onChange) {
  const el = document.getElementById(id);
  const sync = () => { el.value = settings[key]; };
  sync();
  el.addEventListener('input', () => {
    settings[key] = el.value;
    if (onChange) onChange();
    saveSettings();
  });
  widgetSyncs.push(sync);
}
function bindSelect(id, key, onChange) {
  const el = document.getElementById(id);
  const sync = () => { el.value = settings[key]; };
  sync();
  el.addEventListener('change', () => {
    settings[key] = el.value;
    if (onChange) onChange();
    saveSettings();
  });
  widgetSyncs.push(sync);
}
function bindCheckbox(id, key, onChange) {
  const el = document.getElementById(id);
  const sync = () => { el.checked = settings[key]; };
  sync();
  el.addEventListener('change', () => {
    settings[key] = el.checked;
    if (onChange) onChange();
    saveSettings();
  });
  widgetSyncs.push(sync);
}
function resetSettings() {
  Object.assign(settings, defaultSettings);
  for (const f of widgetSyncs) f();
  applyBg();
  applyVignette();
  applyCamMode();
  applyHint();
  updateModeButton();
  updateSpeedButton();
  saveSettings();
}

function applyBg() { document.body.style.background = settings.bgColor; }
function applyVignette() {
  const el = document.getElementById('vignette');
  if (!el) return;
  if (settings.vignette > 0) {
    el.hidden = false;
    el.style.setProperty('--vignette-blur', settings.vignette + 'px');
  } else {
    el.hidden = true;
  }
}

function applyCamMode() {
  document.body.classList.toggle('no-cam', settings.cameraMode === 'fix');
}
function applyHint() {
  const hintEl = document.querySelector('.hint');
  if (!hintEl) return;
  hintEl.textContent = settings.interactive
    ? 'click = couper · espace = recommencer'
    : 'click / espace = recommencer';
}
function updateModeButton() {
  const btn = document.getElementById('modeBtn');
  if (!btn) return;
  btn.textContent = settings.interactive ? 'PLAY' : 'DEMO';
  btn.classList.toggle('mode-play', settings.interactive);
}
function applyInteractiveState() {
  applyHint();
  updateModeButton();
  pendingClick = null;
  // always wipe cinematic state on toggle: auto-mode and play-mode use
  // different cinematicState shapes, leaving stale state would confuse
  // whichever tick takes over and either lock the loop or crash.
  cinematicState = null;
  nextCutDelay = 0;
  // pull the camera back to overview so the user starts each play cycle
  // (or returns to demo) from a clean wide shot rather than mid-zoom.
  if (camera.scale !== 1 || camera.cx !== W / 2 || camera.cy !== H / 2) {
    animateCamera(identityCamera(), 600);
  }
}

bindRange('p_count',          'shapeCount',     fmtNum);
bindRange('p_shapeInset',     'shapeInset',     v => Math.round(v * 100) + '%');
bindRange('p_shapeGap',       'shapeGap',       fmtPx);
bindSelect('p_cameraMode',    'cameraMode',     () => {
  applyCamMode();
  cinematicState = null;
  if (settings.cameraMode === 'fix' &&
      (camera.scale !== 1 || camera.cx !== W/2 || camera.cy !== H/2)) {
    animateCamera(identityCamera(), 600);
  }
});
bindCheckbox('p_interactive', 'interactive',    applyInteractiveState);
bindRange('p_camPadding',     'camPadding',     fmtPx);
bindRange('p_camMaxZoom',     'camMaxZoom',     fmtFloat);
bindRange('p_camPanDuration', 'camPanDuration', fmtMs);
bindRange('p_camCuts',        'camCuts',        fmtNum, () => {
  if (settings.camCutsMax < settings.camCuts) {
    settings.camCutsMax = settings.camCuts;
    const el = document.getElementById('p_camCutsMax');
    const val = document.getElementById('v_camCutsMax');
    if (el) el.value = settings.camCutsMax;
    if (val) val.textContent = fmtNum(settings.camCutsMax);
  }
});
bindRange('p_camCutsMax',     'camCutsMax',     fmtNum, () => {
  if (settings.camCuts > settings.camCutsMax) {
    settings.camCuts = settings.camCutsMax;
    const el = document.getElementById('p_camCuts');
    const val = document.getElementById('v_camCuts');
    if (el) el.value = settings.camCuts;
    if (val) val.textContent = fmtNum(settings.camCuts);
  }
});
bindRange('p_camOverviewHold','camOverviewHold',fmtMs);
bindRange('p_lineSpeed',      'lineSpeed',      fmtMs);
bindRange('p_animDur',        'animDuration',   fmtMs);
bindSelect('p_cutMode',       'cutMode');
bindRange('p_elasticity',     'elasticity',     fmtFloat);
bindRange('p_jellySpread',    'jellySpread',    fmtFloat2);
bindRange('p_separation',     'separation',     fmtPx);
bindRange('p_colorCount',     'colorCount',     fmtNum);
bindRange('p_splitPhase',     'splitPhase',     fmtMs);
bindRange('p_pausePhase',     'pausePhase',     fmtMs);
bindRange('p_glow',           'glow',           fmtPx);
bindRange('p_glowDecay',      'glowDecay',      fmtMs);
bindRange('p_glowIntensity',  'glowIntensity',  fmtFloat2);
bindRange('p_fadeMin',        'fadeMin',        fmtSec, () => {
  if (settings.fadeMax < settings.fadeMin) {
    settings.fadeMax = settings.fadeMin;
    const el = document.getElementById('p_fadeMax');
    const val = document.getElementById('v_fadeMax');
    el.value = settings.fadeMax;
    val.textContent = fmtSec(settings.fadeMax);
  }
});
bindRange('p_fadeMax',        'fadeMax',        fmtSec, () => {
  if (settings.fadeMin > settings.fadeMax) {
    settings.fadeMin = settings.fadeMax;
    const el = document.getElementById('p_fadeMin');
    const val = document.getElementById('v_fadeMin');
    el.value = settings.fadeMin;
    val.textContent = fmtSec(settings.fadeMin);
  }
});
bindColor('p_bg',             'bgColor',        applyBg);
bindColor('p_stroke',         'strokeColor');
bindRange('p_strokeWidth',    'strokeWidth',    fmtPx);
bindCheckbox('p_proportionalStroke', 'proportionalStroke');
bindRange('p_strokeRefRadius', 'strokeRefRadius', fmtPx);
bindRange('p_strokeMaxWidth', 'strokeMaxWidth', fmtPx);
bindRange('p_vignette',       'vignette',       fmtPx, applyVignette);
bindSelect('p_strokeStyle',   'strokeStyle');
bindCheckbox('p_audioOn',     'audioOn',        () => {
  audio.applyMasterVolume();
  if (!settings.audioOn) audio.ensureWind(false);
});
bindRange('p_audioVolume',    'audioVolume',    fmtPct, () => audio.applyMasterVolume());

document.getElementById('toggleBtn').addEventListener('click', () => {
  const p = document.getElementById('panel');
  p.hidden = !p.hidden;
  document.body.classList.toggle('panel-open', !p.hidden);
});
document.getElementById('modeBtn').addEventListener('click', () => {
  settings.interactive = !settings.interactive;
  const cb = document.getElementById('p_interactive');
  if (cb) cb.checked = settings.interactive;
  applyInteractiveState();
  saveSettings();
});

const SPEED_VALUES = [0.5, 1, 1.5, 2, 3];
function updateSpeedButton() {
  const btn = document.getElementById('speedBtn');
  if (!btn) return;
  const v = settings.speed || 1;
  btn.textContent = (Number.isInteger(v) ? v : v.toFixed(1)) + '×';
}
document.getElementById('speedBtn').addEventListener('click', () => {
  const cur = settings.speed || 1;
  let i = SPEED_VALUES.indexOf(cur);
  if (i < 0) i = SPEED_VALUES.indexOf(1);
  settings.speed = SPEED_VALUES[(i + 1) % SPEED_VALUES.length];
  updateSpeedButton();
  saveSettings();
});

// ---------- interactive export (crop + fit-all) ----------
let cropState = null; // null | { dragging, startScreen, endScreen }
function isPaused() { return cropState !== null; }

function downloadPng(dataUrl, suffix) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `slice-${suffix}-${Date.now()}.png`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// Render to an offscreen canvas at exportScale× the requested CSS dimensions,
// then snapshot it as a PNG. Globals (canvas, ctx, W, H, camera) are swapped
// in for the duration so the existing render()/drawShape pipeline doesn't
// need to know it's being asked to draw somewhere else.
function exportAtCssDims(cssW, cssH, opts, camOverride) {
  const scale = Math.max(1, settings.exportScale || 3);
  const off = document.createElement('canvas');
  off.width = Math.max(1, Math.round(cssW * scale));
  off.height = Math.max(1, Math.round(cssH * scale));
  const offCtx = off.getContext('2d');
  offCtx.setTransform(scale, 0, 0, scale, 0, 0);
  const savedCanvas = canvas, savedCtx = ctx;
  const savedW = W, savedH = H;
  const savedCamera = { ...camera };
  canvas = off; ctx = offCtx;
  W = cssW; H = cssH;
  if (camOverride) Object.assign(camera, camOverride);
  render(opts);
  const dataUrl = off.toDataURL('image/png');
  canvas = savedCanvas; ctx = savedCtx;
  W = savedW; H = savedH;
  Object.assign(camera, savedCamera);
  return dataUrl;
}

function snapshotFitAll() {
  if (!shapes.length) return;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  for (const s of shapes) {
    const c = getCentroid(s);
    const r = getBoundingRadius(s);
    if (c.x - r < x0) x0 = c.x - r;
    if (c.y - r < y0) y0 = c.y - r;
    if (c.x + r > x1) x1 = c.x + r;
    if (c.y + r > y1) y1 = c.y + r;
  }
  if (!isFinite(x0)) return;
  const screenPad = 40;
  const wW = x1 - x0, wH = y1 - y0;
  const sX = (W - 2 * screenPad) / Math.max(1, wW);
  const sY = (H - 2 * screenPad) / Math.max(1, wH);
  const cam = {
    cx: (x0 + x1) / 2,
    cy: (y0 + y1) / 2,
    scale: Math.max(0.05, Math.min(sX, sY)),
  };
  const dataUrl = exportAtCssDims(W, H, { fillBackground: true, drawCutLine: false }, cam);
  downloadPng(dataUrl, 'fit');
}

function snapshotCrop() {
  const r = cropRectGeom();
  if (!r || r.w < 5 || r.h < 5) return;
  // Map the screen rect to a world rect using the current (live) camera.
  const wp0 = screenToWorld(r.x, r.y);
  const wp1 = screenToWorld(r.x + r.w, r.y + r.h);
  const wW = wp1.x - wp0.x, wH = wp1.y - wp0.y;
  const cam = {
    cx: (wp0.x + wp1.x) / 2,
    cy: (wp0.y + wp1.y) / 2,
    scale: Math.min(r.w / Math.max(1e-6, wW), r.h / Math.max(1e-6, wH)),
  };
  const dataUrl = exportAtCssDims(r.w, r.h, { fillBackground: true, drawCutLine: false }, cam);
  downloadPng(dataUrl, 'crop');
}

function cropRectGeom() {
  if (!cropState || !cropState.startScreen || !cropState.endScreen) return null;
  const s = cropState.startScreen, e = cropState.endScreen;
  return {
    x: Math.min(s.x, e.x),
    y: Math.min(s.y, e.y),
    w: Math.abs(e.x - s.x),
    h: Math.abs(e.y - s.y),
  };
}

function updateCropUI() {
  const rectEl = document.getElementById('cropRect');
  const okBtn = document.getElementById('cropOkBtn');
  const r = cropRectGeom();
  if (r && (r.w > 0 || r.h > 0)) {
    rectEl.hidden = false;
    rectEl.style.left = r.x + 'px';
    rectEl.style.top = r.y + 'px';
    rectEl.style.width = r.w + 'px';
    rectEl.style.height = r.h + 'px';
    okBtn.disabled = !(r.w >= 5 && r.h >= 5);
  } else {
    rectEl.hidden = true;
    okBtn.disabled = true;
  }
}

function enterCropMode() {
  // settle the scene so the snapshot doesn't capture mid-flight pieces or a
  // hovering cut line; abort any camera animation in flight as well.
  for (const s of shapes) finalizeAnim(s);
  cutState = null;
  cinematicState = null;
  cameraAnim = null;
  pendingClick = null;
  audio.ensureWind(false);
  cropState = { dragging: false, startScreen: null, endScreen: null };
  document.getElementById('cropOverlay').hidden = false;
  document.body.classList.add('crop-mode');
  updateCropUI();
}

function exitCropMode() {
  cropState = null;
  document.getElementById('cropOverlay').hidden = true;
  document.body.classList.remove('crop-mode');
  // give the auto loop a small breather before resuming
  nextCutDelay = 300;
}

document.getElementById('exportBtn').addEventListener('click', () => {
  if (isPaused()) exitCropMode(); else enterCropMode();
});

const overlay = document.getElementById('cropOverlay');
overlay.addEventListener('pointerdown', e => {
  if (!cropState) return;
  if (e.target.closest('.crop-toolbar')) return; // clicks on toolbar pass through
  e.preventDefault();
  overlay.setPointerCapture(e.pointerId);
  cropState.dragging = true;
  cropState.startScreen = { x: e.clientX, y: e.clientY };
  cropState.endScreen = { x: e.clientX, y: e.clientY };
  updateCropUI();
});
overlay.addEventListener('pointermove', e => {
  if (!cropState || !cropState.dragging) return;
  cropState.endScreen = { x: e.clientX, y: e.clientY };
  updateCropUI();
});
overlay.addEventListener('pointerup', e => {
  if (!cropState) return;
  cropState.dragging = false;
  try { overlay.releasePointerCapture(e.pointerId); } catch (_) {}
  updateCropUI();
});
overlay.addEventListener('pointercancel', () => {
  if (cropState) cropState.dragging = false;
});

document.getElementById('cropOkBtn').addEventListener('click', () => {
  snapshotCrop();
  exitCropMode();
});
document.getElementById('cropFitBtn').addEventListener('click', () => {
  snapshotFitAll();
  exitCropMode();
});
document.getElementById('cropCancelBtn').addEventListener('click', exitCropMode);

window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isPaused()) { e.preventDefault(); exitCropMode(); }
});
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('resetSettingsBtn').addEventListener('click', resetSettings);

applyBg();
applyVignette();
applyCamMode();
applyHint();
updateModeButton();
updateSpeedButton();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
